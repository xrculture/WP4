# ARCore - Complete rules
-keep class com.google.ar.core.** { *; }
-keep class com.google.ar.** { *; }
-keepclassmembers class com.google.ar.** { *; }
-dontwarn com.google.ar.**

# Keep ArCoreApk specifically (critical for availability check)
-keep class com.google.ar.core.ArCoreApk { *; }
-keep class com.google.ar.core.ArCoreApk$* { *; }
-keepclassmembers class com.google.ar.core.ArCoreApk { *; }

# Keep all ARCore exceptions
-keep class com.google.ar.core.exceptions.** { *; }

# Keep native methods (required for JNI)
-keepclasseswithmembernames,includedescriptorclasses class * {
    native <methods>;
}

# Keep all enums
-keepclassmembers enum * {
    public static **[] values();
    public static ** valueOf(java.lang.String);
}

# OpenGL/EGL
-keep class javax.microedition.khronos.** { *; }
-keep class android.opengl.** { *; }
-keep class com.google.android.gles_jni.** { *; }

# Camera2
-keep class android.hardware.camera2.** { *; }
-keep class android.media.** { *; }

# MAUI/Mono
-keep class Microsoft.Maui.** { *; }
-keep class Mono.Android.** { *; }
-keep class mono.android.** { *; }

# Reflection (ARCore uses reflection internally)
-keepattributes Signature
-keepattributes *Annotation*
-keepattributes EnclosingMethod
-keepattributes InnerClasses